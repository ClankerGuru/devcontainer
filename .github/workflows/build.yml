name: Build and push devcontainer images

on:
  push:
    tags:
      - 'gradle-*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/clankerguru/devcontainer

jobs:
  base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: jvm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:gradle-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  agents:
    needs: base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - agents: claude
            tag: gradle-claude
          - agents: copilot
            tag: gradle-copilot
          - agents: codex
            tag: gradle-codex
          - agents: opencode
            tag: gradle-opencode
          - agents: all
            tag: gradle-all
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: jvm-agents
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_TAG=gradle-latest
            AGENTS=${{ matrix.agents }}
          tags: ${{ env.IMAGE }}:${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
