name: Build and push devcontainer images

on:
  push:
    tags:
      - 'gradle-*'
  schedule:
    # Rebuild weekly on Mondays at 06:00 UTC to pick up latest tool versions
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/clankerguru/devcontainer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE }}:gradle-latest"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAGS="${TAGS},${{ env.IMAGE }}:${{ github.ref_name }}"
          fi
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            TAGS="${TAGS},${{ env.IMAGE }}:gradle-$(date +%Y%m%d)"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: jvm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
